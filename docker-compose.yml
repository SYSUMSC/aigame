services:
  # 兼容文件：启动依赖服务 + 容器化 EvaluateApp；WebApp 仍需自行启动。
  mongo:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/mongodb/mongodb-community-server:8.0.13-ubuntu2204
    container_name: mongo
    restart: always
    networks:
      - aigame
    ports:
      - '${MONGO_HOST_PORT:-27017}:27017'
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - MONGODB_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:-root}
      - MONGODB_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-password}
    volumes:
      - ./data/mongo:/data/db
      - /etc/localtime:/etc/localtime:ro
      - ./data/mongodb.key:/etc/mongo/mongodb.key:ro
    command:
      - mongod
      - --replSet
      - ${MONGODB_REPLICA_SET:-rs0}
      - --bind_ip_all
      - --keyFile
      - /etc/mongo/mongodb.key

  redis:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/redis:8.0.3
    container_name: redis
    restart: always
    networks:
      - aigame
    ports:
      - '${REDIS_HOST_PORT:-6379}:6379'
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-password}
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - ./data/redis:/data
      - /etc/localtime:/etc/localtime:ro
      - /usr/share/zoneinfo/Asia/Shanghai:/etc/timezone:ro
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:-password}

  minio:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/quay.io/minio/minio:latest
    container_name: minio
    restart: always
    networks:
      - aigame
    ports:
      - '${MINIO_API_HOST_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_HOST_PORT:-9001}:9001'
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-root}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-password}
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - ./data/minio:/data
      - /etc/localtime:/etc/localtime:ro
      - /usr/share/zoneinfo/Asia/Shanghai:/etc/timezone:ro
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  evaluateapp:
    build:
      context: .
      dockerfile: evaluateapp/docker/evaluateapp.Dockerfile
    container_name: evaluateapp
    restart: always
    networks:
      - aigame
    depends_on:
      - mongo
      - redis
      - minio
    ports:
      - '${EVALUATEAPP_HOST_PORT:-8000}:8000'
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      # 容器化 EvaluateApp 必须显式走 Docker 沙箱，避免根目录 `.env` 中的宿主机配置误伤。
      - SANDBOX_BACKEND=DOCKER
      - DOCKER_IMAGE=self
    env_file:
      - ./.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
      - /usr/share/zoneinfo/Asia/Shanghai:/etc/timezone:ro

networks:
  aigame:
