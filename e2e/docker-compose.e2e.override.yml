services:
  mongo:
    container_name: ${COMPOSE_PROJECT_NAME:-aigame-e2e}-mongo

  redis:
    container_name: ${COMPOSE_PROJECT_NAME:-aigame-e2e}-redis

  minio:
    container_name: ${COMPOSE_PROJECT_NAME:-aigame-e2e}-minio

  evaluateapp:
    container_name: ${COMPOSE_PROJECT_NAME:-aigame-e2e}-evaluateapp
    environment:
      # E2E 固定复用容器镜像做评测，避免根目录 `.env` 里默认的宿主机沙箱配置影响测试稳定性。
      WEBAPP_CALLBACK_URL: http://webapp:3000/api/submissions/callback
      SHARED_SECRET: ${E2E_SHARED_SECRET:-aigame-e2e-shared-secret}
      SANDBOX_BACKEND: DOCKER
      DOCKER_IMAGE: self

  webapp:
    container_name: ${COMPOSE_PROJECT_NAME:-aigame-e2e}-webapp
    environment:
      EVALUATE_APP_SECRET: ${E2E_SHARED_SECRET:-aigame-e2e-shared-secret}
      EVALUATE_APP_UPLOAD_SECRET: ${E2E_SHARED_SECRET:-aigame-e2e-shared-secret}
      WEBAPP_BASE_URL: http://127.0.0.1:${WEBAPP_HOST_PORT:-33000}
      AUTH_ORIGIN: http://127.0.0.1:${WEBAPP_HOST_PORT:-33000}
      NUXT_EVALUATE_APP_SECRET: ${E2E_SHARED_SECRET:-aigame-e2e-shared-secret}
      NUXT_EVALUATE_APP_UPLOAD_SECRET: ${E2E_SHARED_SECRET:-aigame-e2e-shared-secret}
      NUXT_WEBAPP_BASE_URL: http://127.0.0.1:${WEBAPP_HOST_PORT:-33000}
      NUXT_PUBLIC_BASE_URL: http://127.0.0.1:${WEBAPP_HOST_PORT:-33000}
      MINIO_PUBLIC_URL: http://127.0.0.1:${MINIO_API_HOST_PORT:-39000}
      NUXT_MINIO_PUBLIC_URL: http://127.0.0.1:${MINIO_API_HOST_PORT:-39000}
      NUXT_PUBLIC_MINIO_PUBLIC_URL: http://127.0.0.1:${MINIO_API_HOST_PORT:-39000}
      SMTP_STUB: "true"
